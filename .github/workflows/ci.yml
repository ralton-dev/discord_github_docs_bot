name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch / PR so PR pushes don't queue up
# stale runner minutes. We do NOT set this on release.yml — never cancel a
# half-finished publish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-and-unit-test:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            services/discord-bot/requirements.txt
            services/rag/requirements.txt
            services/ingestion/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements-dev.txt \
            -r services/discord-bot/requirements.txt \
            -r services/rag/requirements.txt \
            -r services/ingestion/requirements.txt

      - name: Run unit tests
        # `-m "not integration"` is forward-compatible: when no tests carry
        # the `integration` marker (today's state), pytest selects all of
        # them. Once task 07 lands and registers the marker, this filter
        # automatically excludes the slow suite from this job.
        run: pytest -m "not integration"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint
        run: make helm-lint

      - name: Helm template
        run: make helm-template

  detect-integration-tests:
    name: Detect integration tests
    runs-on: ubuntu-latest
    # Cheap gate so we don't spin up a full Python install in
    # `integration-test` until plan 07 lands `tests/integration/**`. The
    # `hashFiles()` expression is only allowed inside steps, hence this
    # tiny detector job that exposes the result as a job output.
    outputs:
      present: ${{ steps.check.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for integration test tree
        id: check
        run: |
          if [ -n "$(ls -A tests/integration 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [lint-and-unit-test, detect-integration-tests]
    # Skip the whole job until plan 07 lands `tests/integration/**`. Once
    # that tree exists the job runs automatically with no further workflow
    # change.
    if: needs.detect-integration-tests.outputs.present == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            services/discord-bot/requirements.txt
            services/rag/requirements.txt
            services/ingestion/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r requirements-dev.txt \
            -r services/discord-bot/requirements.txt \
            -r services/rag/requirements.txt \
            -r services/ingestion/requirements.txt

      - name: Run integration tests
        # Docker is preinstalled on ubuntu-latest runners; testcontainers
        # (plan 07's preferred harness) talks to the local daemon via the
        # default socket.
        run: make integration-test

  build-images:
    name: Build images (verification, no push)
    runs-on: ubuntu-latest
    # PR-only verification: confirm every Dockerfile still builds. We don't
    # build on push-to-main because release.yml owns the canonical multi-arch
    # build on tag pushes.
    if: github.event_name == 'pull_request'
    needs: lint-and-unit-test
    strategy:
      fail-fast: false
      matrix:
        service: [discord-bot, rag, ingestion]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} (amd64, no push)
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64
          push: false
          # Load the image into the local daemon so the next step can run
          # it. `load: true` is only valid with a single platform.
          load: true
          # GHA cache: shared across runs, scoped per service so the three
          # builds don't trash each other's cache.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          # Tag for local clarity in build logs only — never pushed.
          tags: gitdoc-${{ matrix.service }}:ci

      - name: Smoke-import the service module
        # Catches Dockerfile `COPY` drift and module-level import errors
        # that unit tests (which run against the source tree) miss. Runs
        # `python -c "import <entrypoint>"` inside the built image with
        # dummy env vars that satisfy the module-level os.environ reads.
        # Exits 0 only if every top-level import succeeds.
        run: |
          case "${{ matrix.service }}" in
            rag)         module=app ;;
            ingestion)   module=ingest ;;
            discord-bot) module=bot ;;
          esac
          docker run --rm \
            -e LITELLM_BASE_URL=http://ci.invalid:4000 \
            -e LITELLM_API_KEY=sk-ci \
            -e POSTGRES_DSN=postgresql://ci:ci@ci.invalid/ci \
            -e REPO_URL=https://example.com/ci/repo.git \
            -e REPO_NAME=ci \
            -e GIT_TOKEN= \
            -e RAG_ORCHESTRATOR_URL=http://ci.invalid:8000 \
            -e TARGET_REPO=ci \
            -e DISCORD_BOT_TOKEN=ci-token \
            --entrypoint python \
            "gitdoc-${{ matrix.service }}:ci" \
            -c "import ${module}; print('import ok:', ${module}.__file__)"
