# Local dev stack for gitdoc.
#
# LiteLLM backend (two supported modes — we do NOT bundle a mock here):
#   (a) SSH tunnel to the homelab LiteLLM service, then set
#         LITELLM_BASE_URL=http://host.docker.internal:4000
#       in your .env so containers on this host can reach the tunnel.
#   (b) Bring your own mock (e.g. a local OpenAI-compatible stub on your host)
#       and point LITELLM_BASE_URL at it. Use host.docker.internal for host-side
#       endpoints, or an internal URL if you run the mock as another container.
#
# Quick start:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d db rag
#   docker compose run --rm ingest
#   curl -XPOST localhost:8000/ask \
#     -H 'content-type: application/json' \
#     -d '{"query":"what is this project","repo":"self"}'
#
# The bot service is gated behind `--profile bot` because it needs a real
# Discord token and only one gateway session may exist per token.
#   docker compose --profile bot up -d bot

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: gitdoc
      POSTGRES_PASSWORD: gitdoc
      POSTGRES_DB: gitdoc
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitdoc -d gitdoc"]
      interval: 5s
      timeout: 3s
      retries: 20

  rag:
    build:
      context: ./services/rag-orchestrator
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://gitdoc:gitdoc@db:5432/gitdoc}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      CHAT_MODEL: ${CHAT_MODEL:-claude-opus-4-7}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # python-slim has no curl/wget; use the interpreter we already have.
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/healthz', timeout=2).status == 200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  ingest:
    build:
      context: ./services/ingestion
    restart: "no"
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://gitdoc:gitdoc@db:5432/gitdoc}
      REPO_URL: ${REPO_URL}
      REPO_NAME: ${REPO_NAME:-self}
      REPO_BRANCH: ${REPO_BRANCH:-main}
      GIT_TOKEN: ${GIT_TOKEN:-}
      LITELLM_BASE_URL: ${LITELLM_BASE_URL}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      EMBED_MODEL: ${EMBED_MODEL:-text-embedding-3-small}
      EMBED_BATCH: ${EMBED_BATCH:-64}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy

  bot:
    build:
      context: ./services/discord-bot
    profiles: ["bot"]
    environment:
      RAG_ORCHESTRATOR_URL: ${RAG_ORCHESTRATOR_URL:-http://rag:8000}
      TARGET_REPO: ${TARGET_REPO:-self}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      GUILD_ALLOWLIST: ${GUILD_ALLOWLIST:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      rag:
        condition: service_healthy

volumes:
  db-data:
