[pytest]
testpaths = services tests/integration
addopts = -q -m "not integration" --import-mode=importlib
# `importlib` import mode keeps each service's test module in its own
# namespace without needing the test files to have globally-unique names.
# Without it, two services both defining a `tests/test_logging.py` would
# collide on the default `prepend` importer (pytest sees two module objects
# named `test_logging` and aborts collection with "import file mismatch").
# With `importlib`, each test file is loaded by path and kept isolated.
#
# Each service directory gets its own conftest.py that sets the env vars the
# module under test reads at import time; that isolation means rootdir / paths
# resolve correctly when tests run from the repo root.
#
# Integration tests (tests/integration/, marked with @pytest.mark.integration)
# require Docker and own pgvector + a mock LiteLLM via testcontainers. They are
# skipped by default; opt in with `pytest -m integration` (or `make
# integration-test`).
markers =
    integration: end-to-end tests requiring Docker
    no_autoset_model: opt-out of the rag conftest auto-mock of _get_chat_model_for_repo
