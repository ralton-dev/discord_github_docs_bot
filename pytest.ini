[pytest]
testpaths = services tests/integration
addopts = -q -m "not integration"
# Each service directory gets its own conftest.py that sets the env vars the
# module under test reads at import time; that isolation means rootdir / paths
# resolve correctly when tests run from the repo root.
#
# Integration tests (tests/integration/, marked with @pytest.mark.integration)
# require Docker and own pgvector + a mock LiteLLM via testcontainers. They are
# skipped by default; opt in with `pytest -m integration` (or `make
# integration-test`).
markers =
    integration: end-to-end tests requiring Docker
