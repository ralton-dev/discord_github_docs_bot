# Per-instance values file. Copy to values-<slug>.yaml and fill in.
# Real secrets should come from sealed-secrets / external-secrets in production.

repo:
  name: "project-a"
  url:  "https://github.com/your-org/project-a.git"
  branch: "main"

images:
  bot:        { tag: "0.1.0" }
  rag:        { tag: "0.1.0" }
  ingestion:  { tag: "0.1.0" }

secrets:
  discordBotToken: "REPLACE_ME"
  litellmApiKey:   "REPLACE_ME"
  postgresDsn:     "postgresql://gitdoc:REPLACE_ME@postgres.db.svc:5432/gitdoc_project_a"
  gitToken:        ""   # only needed for private repos

discordBot:
  guildAllowlist: "123456789012345678"

ingestion:
  schedule: "0 */6 * * *"
