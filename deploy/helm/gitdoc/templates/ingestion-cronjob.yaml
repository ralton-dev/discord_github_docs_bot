apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "gitdoc.fullname" . }}-ingest
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingestion
spec:
  schedule: {{ .Values.ingestion.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            {{- include "gitdoc.labels" . | nindent 12 }}
            app.kubernetes.io/component: ingestion
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: ingest
              image: "{{ .Values.images.ingestion.repository }}:{{ .Values.images.ingestion.tag }}"
              imagePullPolicy: {{ .Values.images.ingestion.pullPolicy }}
              envFrom:
                - configMapRef:
                    name: {{ include "gitdoc.fullname" . }}-config
                - secretRef:
                    name: {{ include "gitdoc.fullname" . }}-secrets
              # HOME under the read-only rootfs would block `git clone` from
              # writing transient state (~/.gitconfig, ~/.cache/git). Point it
              # at a writable emptyDir.
              env:
                - name: HOME
                  value: /home/app
              volumeMounts:
                - name: scratch
                  mountPath: /tmp
                - name: home
                  mountPath: /home/app
              resources:
                {{- toYaml .Values.ingestion.resources | nindent 16 }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 10001
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: scratch
              emptyDir:
                sizeLimit: {{ .Values.ingestion.scratchSize | quote }}
            - name: home
              emptyDir:
                sizeLimit: "64Mi"
