{{- if .Values.dbMigrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "gitdoc.fullname" . }}-db-migrate
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "gitdoc.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        # postgres:16-alpine ships a non-root `postgres` user (uid 70).
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: {{ .Values.dbMigrate.image | quote }}
          command: ["sh", "-c"]
          args:
            - |
              set -eu
              psql "$POSTGRES_DSN" -v ON_ERROR_STOP=1 -f /migrations/init.sql
          # Normalised to envFrom (plan 10) so every workload resolves the
          # Secret through the single `gitdoc.secretName` helper. This
          # container only needs POSTGRES_DSN but exposing the other keys
          # as env vars in a pre-install hook pod is acceptable — the pod
          # is short-lived and the Secret's namespace is already the
          # trust boundary.
          envFrom:
            - secretRef:
                name: {{ include "gitdoc.secretName" . }}
          env:
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: migrations
              mountPath: /migrations
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: migrations
          configMap:
            name: {{ include "gitdoc.fullname" . }}-migrations
        - name: tmp
          emptyDir:
            sizeLimit: "16Mi"
{{- end }}
