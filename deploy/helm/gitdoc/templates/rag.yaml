apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gitdoc.fullname" . }}-rag
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: rag
spec:
  replicas: {{ .Values.ragOrchestrator.replicas }}
  selector:
    matchLabels:
      {{- include "gitdoc.selector.rag" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gitdoc.selector.rag" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: "{{ .Values.images.rag.repository }}:{{ .Values.images.rag.tag }}"
          imagePullPolicy: {{ .Values.images.rag.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "gitdoc.fullname" . }}-config
            - secretRef:
                name: {{ include "gitdoc.fullname" . }}-secrets
          # Python / httpx / openai write transient files to /tmp; root FS is read-only.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.ragOrchestrator.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gitdoc.fullname" . }}-rag
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
    app.kubernetes.io/component: rag
spec:
  selector:
    {{- include "gitdoc.selector.rag" . | nindent 4 }}
  ports:
    - name: http
      port: 8000
      targetPort: http
