apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gitdoc.fullname" . }}-config
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
data:
  REPO_URL: {{ .Values.repo.url | quote }}
  REPO_NAME: {{ .Values.repo.name | quote }}
  REPO_BRANCH: {{ .Values.repo.branch | quote }}
  LITELLM_BASE_URL: {{ .Values.litellm.baseUrl | quote }}
  EMBED_MODEL: {{ .Values.models.embed | quote }}
  EMBED_DIM: {{ .Values.models.embedDim | quote }}
  EMBED_BATCH: {{ .Values.ingestion.embedBatch | quote }}
  CHAT_MODEL: {{ .Values.models.chat | quote }}
  TARGET_REPO: {{ .Values.repo.name | quote }}
  RAG_ORCHESTRATOR_URL: "http://{{ include "gitdoc.fullname" . }}-rag:8000"
  GUILD_ALLOWLIST: {{ .Values.discordBot.guildAllowlist | quote }}
  HYBRID_SEARCH_ENABLED: "{{ .Values.search.hybrid.enabled }}"
  RERANKER_ENABLED: "{{ .Values.reranker.enabled }}"
  RERANKER_URL: {{ .Values.reranker.url | quote }}
  RERANKER_MODEL: {{ .Values.reranker.model | quote }}
  RERANKER_MULT: "{{ .Values.reranker.candidatesMultiplier }}"
  QUERY_CACHE_ENABLED: "{{ .Values.queryCache.enabled }}"
  RATE_LIMIT_ENABLED: "{{ .Values.rateLimits.enabled }}"
  GUILD_TOKENS_PER_HOUR: "{{ .Values.rateLimits.guildTokensPerHour }}"
  USER_TOKENS_PER_HOUR: "{{ .Values.rateLimits.userTokensPerHour }}"
---
# Consumed only by the `db-migrate` pre-install/pre-upgrade Job. Tagged as
# a Helm hook with a more-negative weight than the Job (-10 < -5) so Helm
# creates the ConfigMap before the Job tries to mount it. Without this
# annotation the ConfigMap is a regular resource and is applied AFTER any
# hook of the same phase, so the Job fails to start on a fresh install.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gitdoc.fullname" . }}-migrations
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;

    CREATE TABLE IF NOT EXISTS chunks (
        id            BIGSERIAL PRIMARY KEY,
        repo          TEXT NOT NULL,
        path          TEXT NOT NULL,
        commit_sha    TEXT NOT NULL,
        chunk_index   INT  NOT NULL,
        content       TEXT NOT NULL,
        content_type  TEXT NOT NULL,
        language      TEXT,
        token_count   INT,
        embedding     vector({{ .Values.models.embedDim }}) NOT NULL,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT now(),
        UNIQUE (repo, path, commit_sha, chunk_index)
    );

    CREATE INDEX IF NOT EXISTS chunks_repo_idx ON chunks (repo);
    CREATE INDEX IF NOT EXISTS chunks_embedding_idx
        ON chunks USING hnsw (embedding vector_cosine_ops);

    -- Hybrid search (plan 11). Generated tsvector + GIN keep BM25 ranking
    -- automatic on every INSERT/UPDATE; no application-side trigger needed.
    ALTER TABLE chunks
        ADD COLUMN IF NOT EXISTS content_tsv tsvector
        GENERATED ALWAYS AS (to_tsvector('english', content)) STORED;
    CREATE INDEX IF NOT EXISTS chunks_content_tsv_idx
        ON chunks USING gin (content_tsv);

    CREATE TABLE IF NOT EXISTS ingest_runs (
        id            BIGSERIAL PRIMARY KEY,
        repo          TEXT NOT NULL,
        commit_sha    TEXT NOT NULL,
        started_at    TIMESTAMPTZ NOT NULL DEFAULT now(),
        finished_at   TIMESTAMPTZ,
        chunk_count   INT,
        status        TEXT NOT NULL DEFAULT 'running'
    );

    -- Query cache (plan 13). Answers are keyed by
    -- (repo, commit_sha, query_hash); ingestion invalidates stale rows on
    -- new commit_sha. See docs/retrieval.md.
    CREATE TABLE IF NOT EXISTS query_cache (
        repo        TEXT NOT NULL,
        commit_sha  TEXT NOT NULL,
        query_hash  TEXT NOT NULL,
        answer      TEXT NOT NULL,
        citations   JSONB NOT NULL,
        created_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
        hits        INT NOT NULL DEFAULT 0,
        PRIMARY KEY (repo, commit_sha, query_hash)
    );
    CREATE INDEX IF NOT EXISTS query_cache_repo_created_idx
        ON query_cache (repo, created_at DESC);

    -- Rate-limit usage (plan 14). Per-guild and per-user hourly token
    -- budgets are enforced by SUM(tokens) WHERE window_at > now() -
    -- interval '1 hour'. See docs/rate-limits.md.
    CREATE TABLE IF NOT EXISTS rate_limit_usage (
        id          BIGSERIAL PRIMARY KEY,
        guild_id    TEXT NOT NULL,
        user_id     TEXT NOT NULL,
        repo        TEXT NOT NULL,
        tokens      INT NOT NULL,
        window_at   TIMESTAMPTZ NOT NULL DEFAULT now()
    );
    CREATE INDEX IF NOT EXISTS rate_limit_usage_guild_window_idx
        ON rate_limit_usage (guild_id, window_at DESC);
    CREATE INDEX IF NOT EXISTS rate_limit_usage_user_window_idx
        ON rate_limit_usage (user_id, window_at DESC);
