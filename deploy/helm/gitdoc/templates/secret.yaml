{{- /*
Rendered only when the operator has NOT provided an out-of-band Secret
(via `secrets.existingSecret`). That path is the bootstrap / first-deploy
workflow where plaintext credentials live in `values-<slug>.yaml`. For
steady-state deploys, install sealed-secrets and set `secrets.existingSecret`
— see deploy/SECRETS.md.

Either way, the resulting Secret MUST expose these four keys:
  DISCORD_BOT_TOKEN, LITELLM_API_KEY, POSTGRES_DSN, GIT_TOKEN
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gitdoc.fullname" . }}-secrets
  labels:
    {{- include "gitdoc.labels" . | nindent 4 }}
type: Opaque
stringData:
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | quote }}
  LITELLM_API_KEY:   {{ .Values.secrets.litellmApiKey | quote }}
  POSTGRES_DSN:      {{ .Values.secrets.postgresDsn | quote }}
  GIT_TOKEN:         {{ .Values.secrets.gitToken | quote }}
  WEBHOOK_SECRET:    {{ .Values.secrets.webhookSecret | default "" | quote }}
{{- end }}
