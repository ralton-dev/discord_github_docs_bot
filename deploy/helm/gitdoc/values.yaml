nameOverride: ""

# Images live in GHCR under the ralton-dev org. Public images are free to
# pull; no `regcred` Secret needed unless a package is set to private (see
# deploy/REGISTRY.md). The image tag should match `make print-tag` output
# at deploy time.
images:
  bot:
    repository: ghcr.io/ralton-dev/gitdoc-discord-bot
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  rag:
    repository: ghcr.io/ralton-dev/gitdoc-rag
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  ingestion:
    repository: ghcr.io/ralton-dev/gitdoc-ingestion
    tag: "0.1.0"
    pullPolicy: IfNotPresent

repo:
  name: "example"
  url: "https://github.com/example/example.git"
  branch: "main"

litellm:
  baseUrl: "http://litellm.litellm.svc.cluster.local:4000"

models:
  embed: "text-embedding-3-small"
  embedDim: 1536
  # Default chat model — runtime-overridable via the bot's /model command
  # once task 17 lands (per-instance setting persisted in the DB).
  chat: "ollama_chat/llama3.2:3b"

# Secrets are materialised into a Kubernetes Secret the workloads envFrom.
#
# Two modes, mutually exclusive:
#
#   1. BOOTSTRAP (plaintext, first deploy only)
#      Leave `existingSecret` empty and fill the `discordBotToken` /
#      `litellmApiKey` / `postgresDsn` / `gitToken` fields below. Values
#      render into a chart-managed Secret. DO NOT commit values files
#      that use this path — the repo's .gitignore covers `values-*.yaml`
#      (except `values-example.yaml`). Intended only to get the very
#      first deploy off the ground before sealed-secrets is installed.
#
#   2. SEALED (steady-state, recommended)
#      Set `existingSecret` to the name of a Secret the operator has
#      materialised out-of-band — typically via a SealedSecret manifest
#      applied to the namespace. When this is set, the chart does NOT
#      render its own Secret, and every workload envFrom's the name
#      you provide. See deploy/SECRETS.md for the kubeseal procedure.
#
# In either mode the Secret MUST expose the same four keys — the
# workloads read them by name, not by source:
#   DISCORD_BOT_TOKEN, LITELLM_API_KEY, POSTGRES_DSN, GIT_TOKEN
secrets:
  # Name of a pre-existing Secret in the release namespace. When set,
  # the chart's own Secret is not rendered and workloads envFrom this.
  existingSecret: ""

  # Plaintext bootstrap fields. Ignored when `existingSecret` is set.
  discordBotToken: ""
  litellmApiKey: ""
  postgresDsn: ""
  gitToken: ""
  # Only required when `webhook.enabled` is true; shared secret used to
  # verify GitHub/GitLab push webhooks. See deploy/SECRETS.md + docs/webhooks.md.
  webhookSecret: ""

# Discord allows one gateway websocket per bot token. Keep replicas=1.
# To scale, use Discord sharding, not extra pods.
discordBot:
  replicas: 1
  guildAllowlist: ""   # comma-separated guild IDs; empty = allow all
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

ragOrchestrator:
  replicas: 2
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

ingestion:
  schedule: "0 */6 * * *"
  embedBatch: 64
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  scratchSize: "2Gi"

# Runs the init.sql migrations as a Helm pre-install/upgrade hook.
dbMigrate:
  enabled: true
  image: "postgres:16-alpine"

# Retrieval (plan 11). Hybrid search merges pgvector similarity with BM25
# (`tsvector` + GIN) via Reciprocal Rank Fusion. Disable to fall back to
# vector-only retrieval if a backend issue looks fusion-related.
search:
  hybrid:
    enabled: true

# Cross-encoder reranker (plan 12). When enabled, /ask fetches
# top_k * candidatesMultiplier rows from retrieval and reorders them with
# a cross-encoder before sending the trimmed top_k to the LLM. Disabled by
# default — flip on once a reranker endpoint is provisioned (typically the
# homelab Ollama hosting BAAI/bge-reranker-v2-m3, or a small adapter that
# translates LiteLLM's /v1/rerank shape; see docs/retrieval.md).
reranker:
  enabled: false
  url: ""                                   # e.g. http://ollama.ollama.svc:11434/api/rerank
  model: "BAAI/bge-reranker-v2-m3"
  candidatesMultiplier: 3

# Webhook-driven ingestion (plan 15). When enabled, the rag Deployment
# exposes POST /webhook and spawns a Job from the ingestion CronJob on
# every verified push. The CronJob stays as a safety net.
webhook:
  enabled: false
  # "ok" means last successful ingestion within this many seconds.
  # GET /status/ingestion?repo=<slug> reports this as "ok" or "stale".
  stalenessThresholdSecs: 7200

# Observability (plan 09). The rag Service exposes /metrics in Prometheus
# text format unconditionally; this block controls whether a ServiceMonitor
# custom resource is rendered so the Prometheus Operator picks it up. Leave
# disabled on clusters without the operator CRDs installed.
observability:
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    # Extra labels merged into ServiceMonitor.metadata.labels so operators
    # can use their `serviceMonitorSelector` (commonly requires a label like
    # `release: kube-prometheus-stack`).
    labels: {}
